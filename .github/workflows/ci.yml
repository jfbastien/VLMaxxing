name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies
        # MLX is Apple-only (libmlx.so is not distributed for Linux), so
        # the vlm group is intentionally omitted on CI. Tests that load
        # MLX-dependent scripts use a subprocess probe before importing
        # MLX-backed modules and skip cleanly on non-MLX hosts.
        run: uv sync --locked --group dev --group research --group benchmark --group paper

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest

      - name: Artifact integrity
        run: uv run python scripts/audit_artifact_integrity.py

  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies
        run: uv sync --locked --group dev --group research --group benchmark --group paper

      - name: Sync generated paper assets
        run: uv run python paper/arxiv/scripts/sync_sources.py

      - name: Ensure generated paper assets are committed
        run: uv run python scripts/check_generated_paper_diff.py

      - name: Create arXiv upload bundle from frozen assets
        run: uv run python paper/arxiv/scripts/build.py --skip-pdf --arxiv-upload --no-sync

      - name: Extract arXiv upload bundle
        run: |
          rm -rf .tmp/arxiv-upload
          mkdir -p .tmp/arxiv-upload
          tar -xzf paper/arxiv/dist/codec-through-arxiv-upload.tar.gz -C .tmp/arxiv-upload
          mkdir -p .tmp/arxiv-upload/build
          chmod -R a+rwX .tmp/arxiv-upload
          find .tmp/arxiv-upload -maxdepth 4 -type f | sort

      - name: Build extracted arXiv upload with TeX Live 2025 / XeLaTeX
        run: |
          docker run --rm \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --volume "$PWD/.tmp/arxiv-upload:/work:rw" \
            --workdir /work \
            ghcr.io/xu-cheng/texlive-historic-alpine@sha256:73a48f4fc1d3ee7357c8ea5d274af161541c0981432da33339eed7ac1f8e083d \
            latexmk -xelatex -interaction=nonstopmode -halt-on-error -file-line-error -recorder -outdir=build main.tex

      - name: Upload arXiv artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arxiv-upload-and-pdf
          path: |
            paper/arxiv/dist/codec-through-arxiv-upload.tar.gz
            .tmp/arxiv-upload/build/main.pdf
            .tmp/arxiv-upload/build/main.log
            .tmp/arxiv-upload/build/main.fls
