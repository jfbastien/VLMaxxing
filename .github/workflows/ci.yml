name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies
        # Tests load benchmark scripts that import av / mlx / datasets
        # from the research/vlm/benchmark optional groups, so CI must
        # install all runtime groups, not just dev. See round-16 CI
        # post-mortem (commit TBD).
        run: uv sync --group dev --group research --group benchmark --group vlm --group seed

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest
