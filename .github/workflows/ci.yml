name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies
        # MLX is Apple-only (libmlx.so is not distributed for Linux), so
        # the vlm group is intentionally omitted on CI. Tests that load
        # MLX-dependent scripts use pytest.importorskip("mlx.core") to
        # skip cleanly on non-MLX hosts. See round-16 CI post-mortem.
        run: uv sync --group dev --group research --group benchmark --group paper

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest

  paper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies
        run: uv sync --group dev --group research --group benchmark --group paper

      - name: Generate manuscript assets
        run: uv run --group paper python paper/arxiv/scripts/sync_sources.py

      - name: Build paper PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: paper/arxiv
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error -outdir=build

      - name: Upload paper PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/arxiv/build/main.pdf
