[[clip]]
id = "crosscheck_talking_head"
tier = "crosscheck"
method = "yt-dlp"
content_class = "talking-head"
source_page = "https://www.youtube.com/watch?v=DxREm3s1scA"
local_path = "data/corpus/crosscheck/talking_head.mp4"
license = "YouTube terms; local cross-check only"
intended_use = "replicate predecessor repo behavior locally"
download_command = """yt-dlp -f \"bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]\" --download-sections \"*0:00-0:30\" -o \"data/corpus/crosscheck/talking_head.%(ext)s\" \"https://www.youtube.com/watch?v=DxREm3s1scA\""""

