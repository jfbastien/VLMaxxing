suite_id = "local_suite_v1"
version = 1
track = "A"
sampling_mode = "contiguous_window"
output_protocol = "multiple_choice_single_letter"
notes = """
Initial scored synthetic pilot suite for Track A bring-up.
Natural Xiph clips remain useful for redundancy profiling and agreement-only
checks, but this file intentionally covers only controlled synthetic clips with
clear answer keys.
"""

[[item]]
id = "syn_affine_motion"
clip_id = "synthetic_affine_pan"
bucket = "synthetic-egomotion"
prompt_family = "temporal_change"
question = "Which motion best describes the clip?"
choices = ["The whole scene pans horizontally.", "The camera zooms in.", "Nothing changes.", "A hard scene cut happens."]
answer_index = 0

[[item]]
id = "syn_affine_object_count"
clip_id = "synthetic_affine_pan"
bucket = "synthetic-egomotion"
prompt_family = "count"
question = "How many pink marker squares are present throughout the clip?"
choices = ["Zero", "One", "Two", "Four"]
answer_index = 1

[[item]]
id = "syn_cut_event"
clip_id = "synthetic_scene_cut"
bucket = "synthetic-scene-cut"
prompt_family = "temporal_change"
question = "What happens near the middle of the clip?"
choices = ["The scene abruptly cuts to a different room.", "The camera slowly pans right.", "The object color changes but the room stays the same.", "Only the brightness flickers."]
answer_index = 0

[[item]]
id = "syn_cut_after_color"
clip_id = "synthetic_scene_cut"
bucket = "synthetic-scene-cut"
prompt_family = "scene_fact"
question = "After the cut, what is the dominant wall color?"
choices = ["Blue", "Green", "Orange", "Purple"]
answer_index = 2

[[item]]
id = "syn_flicker_change_type"
clip_id = "synthetic_fullframe_flicker"
bucket = "synthetic-novelty-amplification"
prompt_family = "temporal_change"
question = "What changes over time in the clip?"
choices = ["Only the overall brightness changes.", "The main object walks across the frame.", "The text content changes from ALPHA to BRAVO.", "A scene cut replaces the room."]
answer_index = 0

[[item]]
id = "syn_flicker_layout"
clip_id = "synthetic_fullframe_flicker"
bucket = "synthetic-novelty-amplification"
prompt_family = "scene_fact"
question = "Does the layout of the shapes change across frames?"
choices = ["Yes, the shapes move every frame.", "Yes, the background scrolls sideways.", "No, the layout stays fixed.", "No, because there are no shapes."]
answer_index = 2

[[item]]
id = "syn_color_swap_event"
clip_id = "synthetic_color_swap"
bucket = "synthetic-color"
prompt_family = "temporal_change"
question = "What happens to the large center square?"
choices = ["It moves from left to right.", "It changes from red to green.", "It disappears completely.", "It turns into text."]
answer_index = 1

[[item]]
id = "syn_color_swap_motion"
clip_id = "synthetic_color_swap"
bucket = "synthetic-color"
prompt_family = "localization"
question = "How does the large center square move?"
choices = ["It stays in the center.", "It moves to the top-left corner.", "It moves to the right edge.", "It rotates around the frame."]
answer_index = 0

[[item]]
id = "syn_small_object_motion"
clip_id = "synthetic_small_object"
bucket = "synthetic-small-object"
prompt_family = "temporal_change"
question = "How does the small bright object move?"
choices = ["It moves left to right.", "It moves top to bottom.", "It stays still.", "It disappears after one frame."]
answer_index = 0

[[item]]
id = "syn_small_object_count"
clip_id = "synthetic_small_object"
bucket = "synthetic-small-object"
prompt_family = "count"
question = "How many moving bright objects are present?"
choices = ["Zero", "One", "Two", "Three"]
answer_index = 1

[[item]]
id = "syn_screen_text_change"
clip_id = "synthetic_screen_ocr"
bucket = "synthetic-screen-ocr"
prompt_family = "ocr"
question = "What text replaces ALPHA on the screen?"
choices = ["BRAVO", "CURSOR", "PAN", "GREEN"]
answer_index = 0

[[item]]
id = "syn_screen_content_type"
clip_id = "synthetic_screen_ocr"
bucket = "synthetic-screen-ocr"
prompt_family = "scene_fact"
question = "What kind of content does the clip depict?"
choices = ["A natural outdoor scene", "A code-editor or UI-like screen", "A drone camera fly-through", "A parking-lot surveillance camera"]
answer_index = 1
